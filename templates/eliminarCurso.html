{% extends "layout.html" %} 
{% block container %} 

<div class="max-w-md mx-auto py-10 bg-white p-6 rounded-lg shadow-md">
    <h2 class="text-2xl font-bold text-red-600 mb-4">¿Eliminar este curso?</h2>
    <p class="mb-6 text-gray-600">Esta acción no se puede deshacer.</p>

    <form action="{{ url_for('cursos.eliminarCurso') }}" method="POST">
                {{form.csrf_token}}
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
        {{ form.csrf_token }}
        {{ form.id(type="hidden") }}

        <div class="mb-4">
            <strong>Nombre:</strong> {{ form.nombre.data }}
        </div>
        <div class="mb-6">
            <strong>Descripción:</strong> {{ form.descripcion.data }}
        </div>

        <button type="submit" class= font-medium rounded-base text-sm px-4 py-2.5">
            Eliminar
        </button>
        <a href="{{ url_for('cursos.dashboardCursos') }}" class="ml-4 text-gray-600 underline">Cancelar</a>
    </form>
</div>
{% endblock %}
